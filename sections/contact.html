<!-- ===== Contact Section ===== -->
<section class="contact" id="contact">
  <div class="container">
    <div class="section-header reveal">
      <div class="section-label">Get In Touch</div>
      <h2>Let's Plan Your <span class="highlight">Dream Event</span></h2>
      <p>Ready to create something magical? Reach out to us and let's start planning your perfect celebration.</p>
    </div>

    <div class="contact-grid">
      <div class="contact-form-wrapper reveal">
        <form class="contact-form" id="contactForm" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" placeholder="John Doe" required />
            </div>
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="eventType">Event Type</label>
              <select id="eventType" name="eventType" required>
                <option value="" disabled selected>Select Event</option>
                <option value="wedding">Wedding Decoration</option>
                <option value="birthday">Birthday Decoration</option>
                <option value="engagement">Engagement Decoration</option>
                <option value="housewarming">Housewarming Decoration</option>
                <option value="stage">Stage Decoration</option>
                <option value="other">Other Event</option>
              </select>
            </div>
            <div class="form-group">
              <label for="eventDate">Event Date</label>
              <input type="date" id="eventDate" name="eventDate" />
            </div>
          </div>

          <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" name="message" placeholder="Tell us about your dream event..." rows="4"></textarea>
          </div>

          <div class="form-submit">
            <button type="submit" class="btn btn-primary" id="form-submit-btn">
              <i class="fas fa-paper-plane"></i> Send Message
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- ===== Toast ===== -->
<div class="toast" id="toast">
  <i class="fas fa-check-circle"></i>
  <span id="toastMessage">Message sent successfully!</span>
</div>
