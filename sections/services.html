<!-- ===== Services Section ===== -->
<section class="services" id="services">
  <div class="container">
    <div class="section-header reveal">
      <div class="section-label">Our Services</div>
      <h2>What We <span class="highlight">Offer</span></h2>
      <p>From dream weddings to joyful birthdays, we bring your vision to life with stunning decor for every occasion.</p>
    </div>

    <!-- Populated dynamically from data/services.json -->
    <div class="services-grid" id="servicesGrid"></div>
  </div>
</section>

<!-- ===== Counters Section ===== -->
<section class="counters" id="counters">
  <div class="container">
    <div class="counters-grid">
      <div class="counter-card reveal">
        <i class="fas fa-calendar-check"></i>
        <span class="count" data-target="500">0</span>
        <span class="count-label">Events Completed</span>
      </div>
      <div class="counter-card reveal">
        <i class="fas fa-smile"></i>
        <span class="count" data-target="450">0</span>
        <span class="count-label">Happy Clients</span>
      </div>
      <div class="counter-card reveal">
        <i class="fas fa-award"></i>
        <span class="count" data-target="10">0</span>
        <span class="count-label">Years Experience</span>
      </div>
      <div class="counter-card reveal">
        <i class="fas fa-users"></i>
        <span class="count" data-target="25">0</span>
        <span class="count-label">Team Members</span>
      </div>
    </div>
  </div>
</section>
